# Property Management System — local Docker stack.
# Quick start:
#   cp .env.docker.example .env
#   docker compose up --build
# Then open http://localhost:3000 (frontend) — first run also seeds the database.

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pms}
      MYSQL_USER: ${DB_USERNAME:-pms}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pms}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpms}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "${DB_PORT_HOST:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpms}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pms-backend:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: PMS
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_TIMEZONE: Asia/Dhaka
      LOG_CHANNEL: stack
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-pms}
      DB_USERNAME: ${DB_USERNAME:-pms}
      DB_PASSWORD: ${DB_PASSWORD:-pms}

      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:3000}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-localhost}

      MAIL_MAILER: log
      SMS_PROVIDER: ${SMS_PROVIDER:-log}
      SMS_API_URL: ${SMS_API_URL:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-PMS}

      PMS_RUN_MIGRATIONS: "true"
      PMS_SEED_ON_FIRST_RUN: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend-storage:/var/www/html/storage
      - backend-bootstrap-cache:/var/www/html/bootstrap/cache

  scheduler:
    image: pms-backend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-pms}
      DB_USERNAME: ${DB_USERNAME:-pms}
      DB_PASSWORD: ${DB_PASSWORD:-pms}
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PMS_RUN_MIGRATIONS: "false"
      PMS_SEED_ON_FIRST_RUN: "false"
    volumes:
      - backend-storage:/var/www/html/storage
      - backend-bootstrap-cache:/var/www/html/bootstrap/cache
    # Run Laravel's built-in scheduler loop (executes due tasks every minute)
    command: ["php", "artisan", "schedule:work"]

  queue:
    image: pms-backend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-pms}
      DB_USERNAME: ${DB_USERNAME:-pms}
      DB_PASSWORD: ${DB_PASSWORD:-pms}
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PMS_RUN_MIGRATIONS: "false"
      PMS_SEED_ON_FIRST_RUN: "false"
    volumes:
      - backend-storage:/var/www/html/storage
      - backend-bootstrap-cache:/var/www/html/bootstrap/cache
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-PMS}
        NEXT_PUBLIC_FCM_VAPID_KEY: ${NEXT_PUBLIC_FCM_VAPID_KEY:-}
    image: pms-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  mysql-data:
  redis-data:
  backend-storage:
  backend-bootstrap-cache:
